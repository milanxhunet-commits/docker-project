version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: shlink_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: shlink
      MYSQL_USER: shlink
      MYSQL_PASSWORD: shlinkpassword
    volumes:
      - db_data:/var/lib/mysql

  shlink:
    image: shlinkio/shlink:stable
    container_name: shlink_api
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DEFAULT_DOMAIN: localhost:8080
      IS_HTTPS_ENABLED: "false"
      DB_DRIVER: mysql
      DB_HOST: db
      DB_USER: shlink
      DB_PASSWORD: shlinkpassword
      DB_NAME: shlink

  web:
    image: shlinkio/shlink-web-client:latest
    container_name: shlink_web
    restart: always
    ports:
      - "8081:80"

volumes:
  db_data:

git init
git add .
git commit -m "Initial commit - Docker project"

